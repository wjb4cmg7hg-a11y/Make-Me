kind = "web"
previewPath = "/"
title = "Facial Ratio Analyzer"
version = "1.0.0"
id = "artifacts/face-ratio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22567

[services.development]
run = "pnpm --filter @workspace/face-ratio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/face-ratio", "run", "build" ]
publicDir = "artifacts/face-ratio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22567"
BASE_PATH = "/"
